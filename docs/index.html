<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klinik Komuta Merkezi | Kalp Sağlığı Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <div class="header-titles">
                <h1>Klinik Komuta Merkezi</h1>
                <p>13 Parametreli Kapsamlı Kardiyovasküler Risk Analiz Modülü</p>
            </div>
            <div class="system-status">
                <span class="status-dot"></span> Sistem Aktif (CNN Model)
            </div>
        </header>

        <!-- Sonuç Ekranı (Üst Kısım) -->
        <div class="result-banner" id="result-banner">
            <div class="result-content">
                <div class="result-score" id="result-score">--%</div>
                <div class="result-text">
                    <h2 id="result-title">Veri Bekleniyor</h2>
                    <p id="result-desc">Lütfen aşağıdaki 13 klinik parametreyi girerek analizi başlatın.</p>
                </div>
            </div>
            <button type="submit" form="clinical-form" class="btn-analyze" id="btn-submit">
                <span>VERİLERİ ANALİZ ET</span>
                <div class="spinner" id="btn-spinner"></div>
            </button>
        </div>

        <form id="clinical-form" class="form-grid">
            
            <!-- 1. Sütun: Temel Bulgular -->
            <section class="data-panel">
                <h3 class="panel-title">1. Temel ve Kan Bulguları</h3>
                
                <div class="form-group">
                    <label for="age">Yaş (Age)</label>
                    <input type="number" id="age" value="55" min="1" max="120" required>
                </div>

                <div class="form-group">
                    <label for="sex">Cinsiyet (Sex)</label>
                    <select id="sex">
                        <option value="Erkek (Male)">Erkek (Male)</option>
                        <option value="Kadın (Female)">Kadın (Female)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="trestbps">Dinlenme Kan Basıncı (trestbps) [mmHg]</label>
                    <input type="number" id="trestbps" value="130" required>
                </div>

                <div class="form-group">
                    <label for="chol">Serum Kolesterol (chol) [mg/dl]</label>
                    <input type="number" id="chol" value="240" required>
                </div>

                <div class="form-group">
                    <label for="fbs">Açlık Kan Şekeri > 120 mg/dl (fbs)</label>
                    <div class="radio-group">
                        <label><input type="radio" name="fbs" value="Hayır" checked> Hayır</label>
                        <label><input type="radio" name="fbs" value="Evet (>120 mg/dl)"> Evet</label>
                    </div>
                </div>
            </section>

            <!-- 2. Sütun: Göğüs Ağrısı ve EKG -->
            <section class="data-panel">
                <h3 class="panel-title">2. EKG ve Şikayet Bulguları</h3>

                <div class="form-group">
                    <label for="cp_type">Göğüs Ağrısı Tipi (cp)</label>
                    <select id="cp_type">
                        <option value="Asemptomatik (Asymptomatic)">Asemptomatik (Asymptomatic)</option>
                        <option value="Atipik Anjin (Atypical Angina)">Atipik Anjin (Atypical Angina)</option>
                        <option value="Anjin Olmayan Ağrı (Non-anginal)">Anjin Olmayan Ağrı (Non-anginal)</option>
                        <option value="Tipik Anjin (Typical Angina)">Tipik Anjin (Typical Angina)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="restecg">Dinlenme EKG Sonucu (restecg)</label>
                    <select id="restecg">
                        <option value="Normal">Normal</option>
                        <option value="ST-T Anormalliği">ST-T Anormalliği (ST-T wave abnormality)</option>
                        <option value="LV Hipertrofisi">Sol Ventrikül Hipertrofisi (LV hypertrophy)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="thalch">Ulaşılan Maks. Kalp Hızı (thalch)</label>
                    <input type="number" id="thalch" value="150" required>
                </div>

                <div class="form-group">
                    <label for="ca">Renklendirilmiş Ana Damar Sayısı (ca) [0-3]</label>
                    <input type="number" id="ca" value="0" min="0" max="3" required>
                </div>
            </section>

            <!-- 3. Sütun: Efor ve Talasemi Testleri -->
            <section class="data-panel">
                <h3 class="panel-title">3. Efor Testi ve Görüntüleme</h3>

                <div class="form-group">
                    <label for="exang">Egzersize Bağlı Anjin (exang)</label>
                    <div class="radio-group">
                        <label><input type="radio" name="exang" value="Hayır (No)" checked> Hayır</label>
                        <label><input type="radio" name="exang" value="Evet (Yes)"> Evet</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="oldpeak">ST Depresyonu / Çökmesi (oldpeak)</label>
                    <input type="number" id="oldpeak" value="0.0" step="0.1" required>
                </div>

                <div class="form-group">
                    <label for="slope">ST Segment Eğimi (slope)</label>
                    <select id="slope">
                        <option value="Yukarı Eğimli (Upsloping)">Yukarı Eğimli (Upsloping)</option>
                        <option value="Düz (Flat)">Düz (Flat)</option>
                        <option value="Aşağı Eğimli (Downsloping)">Aşağı Eğimli (Downsloping)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="thal">Talasemi Durumu (thal)</label>
                    <select id="thal">
                        <option value="Normal">Normal</option>
                        <option value="Sabit Hata (Fixed Defect)">Sabit Hata (Fixed Defect)</option>
                        <option value="Geri Döndürülebilir Hata (Reversable Defect)">Geri Döndürülebilir Hata (Reversable Defect)</option>
                    </select>
                </div>
            </section>

        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
